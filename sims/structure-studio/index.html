<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Structure Studio</title><style>
:root{--ink:#102a43;--muted:#486581;--teal:#147d92;--orange:#f59e0b;--green:#2f855a;--paper:#f7fafc;--mist:#e6f4f1;--line:#b8cad6}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#f7fafc,#e6f4f1);color:var(--ink);font:16px/1.55 Arial,sans-serif}.shell{max-width:1180px;margin:auto;padding:24px}h1,h2{font-family:Georgia,serif}h1{font-size:clamp(28px,4vw,46px);margin:.15em 0}.eyebrow{color:var(--teal);font-weight:800;text-transform:uppercase;letter-spacing:1.1px;font-size:12px}.lead{font-size:18px;max-width:75ch}.tabs{display:flex;flex-wrap:wrap;gap:8px;margin:22px 0}.tabs a{padding:9px 12px;border:1px solid var(--line);color:var(--ink);text-decoration:none;background:#ffffffbb;border-radius:999px}.tabs a[aria-current=true]{background:var(--ink);color:#fff}.grid{display:grid;grid-template-columns:.9fr 1.4fr;gap:18px}.glass{background:#ffffffc7;border:1px solid #147d923d;box-shadow:0 14px 34px #102a4317,inset 0 1px #fff;border-radius:18px;padding:20px;backdrop-filter:blur(12px)}label{display:block;font-weight:800;margin:10px 0 5px}select{width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;background:#fff}.code{white-space:pre;overflow:auto;background:linear-gradient(135deg,#f1f8fafa,#e6f4f1cc);border:1px solid #147d9247;border-top:4px solid var(--teal);border-radius:14px;padding:17px;font:14px/1.7 ui-monospace,monospace;color:#243b53}.kw{color:#6d28d9;font-weight:700}.fn{color:#047857;font-weight:700}.num{color:#0369a1;font-weight:700}.str{color:#9a5b13}.op{color:#c2410c;font-weight:700}.cards{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0}.card{min-width:105px;padding:12px;background:#fff;border:1px solid var(--line);border-top:4px solid var(--teal);border-radius:10px}.card.selected{border-color:var(--orange);box-shadow:0 5px 16px #f59e0b25}.meaning{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px}.fact{padding:11px;background:var(--paper);border-left:4px solid var(--green)}button{padding:11px 15px;border:0;border-radius:9px;background:var(--teal);color:#fff;font-weight:800;cursor:pointer}.callout{padding:14px;background:#fff7e6;border-left:5px solid var(--orange);margin:15px 0}@media(max-width:780px){.grid{grid-template-columns:1fr}.shell{padding:15px}}
</style></head><body><main class="shell"><div class="eyebrow">Interactive lab · Week 4</div><h1 id="title"></h1><p class="lead" id="intro"></p><nav class="tabs" id="tabs"></nav><section class="grid"><div class="glass"><h2>Choose a representation</h2><p id="prompt"></p><div id="controls"></div><div class="callout"><strong>Predict:</strong> <span id="question"></span></div><button id="run">Re-house the evidence</button></div><div class="glass"><h2>Structure lens</h2><div class="code" id="code"></div><div class="cards" id="cards"></div><div class="meaning" id="meaning"></div><div class="callout" id="result" aria-live="polite">Choose, predict, then run.</div></div></section></main><script>
const record={species:'Adelie',island:'Torgersen',bill_mm:39.1,mass_g:3750};
const stations={
 lists:{label:'4.1 lists',title:'A list preserves position and permits change',intro:'Indexing, slicing, and methods are operations on an ordered sequence. Position carries meaning only when your program maintains that contract.',prompt:'Select an operation on four penguin body masses.',question:'Which positions remain, and does the original list change?',choices:['index 1','slice 1:3','append 4100','sort'],build:c=>{let a=[3750,3800,3250,3450],out='';if(c==='index 1')out=a[1];if(c==='slice 1:3')out=a.slice(1,3);if(c==='append 4100'){a.push(4100);out=a}if(c==='sort'){a.sort((x,y)=>x-y);out=a}return{code:`masses = [3750, 3800, 3250, 3450]\n${c==='index 1'?'result = masses[1]':c==='slice 1:3'?'result = masses[1:3]':c==='append 4100'?'masses.append(4100)':'masses.sort()'}`,cards:a.map((v,i)=>({k:i,v})),facts:{ordered:'yes',mutable:'yes',duplicates:'allowed'},result:`Result: ${JSON.stringify(out)}. A slice creates a new list; append and sort mutate the list.`}}},
 tuple_set:{label:'4.2 tuple + set',title:'Fixed order and uniqueness solve different problems',intro:'A tuple communicates a fixed record; a set communicates membership and uniqueness. Neither is simply a “special list.”',prompt:'Choose the question the structure must answer.',question:'Do you need stable positions, or unique membership?',choices:['fixed coordinates','unique islands'],build:c=>c==='fixed coordinates'?{code:`location = (-122.23, 37.88)\nlongitude, latitude = location`,cards:[{k:0,v:-122.23},{k:1,v:37.88}],facts:{structure:'tuple',ordered:'yes',mutable:'no'},result:'A tuple fits a fixed two-part coordinate. Unpacking names the positions.'}:{code:`islands = {"Torgersen", "Biscoe", "Dream", "Biscoe"}\ncount = len(islands)`,cards:['Torgersen','Biscoe','Dream'].map(v=>({k:'member',v})),facts:{structure:'set',unique:'yes',indexed:'no'},result:'The repeated island collapses. A set answers membership questions, not position questions.'}},
 dictionaries:{label:'4.3 dictionaries',title:'A dictionary makes field meaning explicit',intro:'Keys replace fragile positional memory. Retrieval becomes a question about a named field.',prompt:'Choose a field to retrieve from one penguin record.',question:'What value is paired with that key?',choices:Object.keys(record),build:c=>({code:`penguin = {\n    "species": "Adelie",\n    "island": "Torgersen",\n    "bill_mm": 39.1,\n    "mass_g": 3750\n}\nanswer = penguin["${c}"]`,cards:Object.entries(record).map(([k,v])=>({k,v,sel:k===c})),facts:{keys:'unique',lookup:'by meaning',mutable:'yes'},result:`penguin["${c}"] returns ${JSON.stringify(record[c])}. The key documents what the value means.`})},
 comprehensions:{label:'4.4 comprehensions',title:'A comprehension is a visible data pipeline',intro:'Read it as subgoals: visit, filter, transform, collect. Compact code is useful only when the pipeline remains explainable.',prompt:'Choose a minimum mass; keep heavier observations and convert grams to kilograms.',question:'Which values pass the filter before transformation?',choices:[3300,3600,3900],build:c=>{let a=[3250,3450,3750,4050],o=a.filter(x=>x>=c).map(x=>x/1000);return{code:`masses_g = [3250, 3450, 3750, 4050]\nheavy_kg = [g / 1000 for g in masses_g if g >= ${c}]`,cards:a.map(v=>({k:v>=c?'keep':'skip',v})),facts:{visit:'each g',filter:`g >= ${c}`,transform:'g / 1000',collect:JSON.stringify(o)},result:`heavy_kg is ${JSON.stringify(o)}. Filter uses grams; transformation happens only for kept values.`}}},
 records:{label:'4.5 dataset records',title:'Representation is a modeling decision',intro:'The same row can be encoded many ways, but the best structure makes intended operations and meaning difficult to misuse.',prompt:'Choose how to represent one row with four differently meaningful fields.',question:'Which representation lets a reader retrieve mass without remembering position 3?',choices:['list','tuple','dictionary'],build:c=>{let code=c==='dictionary'?`row = {"species": "Adelie", "island": "Torgersen",\n       "bill_mm": 39.1, "mass_g": 3750}\nmass = row["mass_g"]`:`row = ${c==='tuple'?'(':'['}"Adelie", "Torgersen", 39.1, 3750${c==='tuple'?')':']'}\nmass = row[3]`;return{code,cards:Object.entries(record).map(([k,v],i)=>({k:c==='dictionary'?k:i,v})),facts:c==='dictionary'?{meaning:'keys are explicit',change:'allowed',best_for:'heterogeneous row'}:{meaning:'positions are implicit',change:c==='list'?'allowed':'not allowed',risk:'index contract'},result:c==='dictionary'?'Dictionary is strongest here: each heterogeneous field is named.':'This works, but position 3 carries hidden meaning. A dictionary is safer for a heterogeneous row.'}}}
};
const aliases={'structure-lists':'lists','structure-tuples-sets':'tuple_set','structure-dictionaries':'dictionaries','structure-comprehensions':'comprehensions','structure-records':'records'};let key=aliases[new URLSearchParams(location.search).get('station')]||'lists',cfg=stations[key];const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));function hi(s){return esc(s).replace(/("[^"]*"|\b(?:for|in|if)\b|\blen\b|\b\d+(?:\.\d+)?\b|&gt;=|=|\/)/g,t=>{let c=t[0]==='"'?'str':/^(for|in|if)$/.test(t)?'kw':t==='len'?'fn':/^\d/.test(t)?'num':'op';return `<span class="${c}">${t}</span>`})}
function render(){title.textContent=cfg.title;intro.textContent=cfg.intro;prompt.textContent=cfg.prompt;question.textContent=cfg.question;tabs.innerHTML=Object.entries(stations).map(([k,v])=>`<a href="?station=${k}" aria-current="${k===key}">${v.label}</a>`).join('');controls.innerHTML=`<label for="choice">Experiment</label><select id="choice">${cfg.choices.map(v=>`<option>${esc(v)}</option>`).join('')}</select>`;go()}function go(){let raw=document.querySelector('#choice').value,v=/^\d+$/.test(raw)?Number(raw):raw,o=cfg.build(v);code.innerHTML=hi(o.code);cards.innerHTML=o.cards.map(x=>`<div class="card ${x.sel?'selected':''}"><small>${esc(x.k)}</small><br><strong>${esc(x.v)}</strong></div>`).join('');meaning.innerHTML=Object.entries(o.facts).map(([k,v])=>`<div class="fact"><strong>${esc(k)}</strong><br>${esc(v)}</div>`).join('');result.textContent=o.result}run.onclick=go;render();
</script></body></html>
