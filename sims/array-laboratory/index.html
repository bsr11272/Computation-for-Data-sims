<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Array Laboratory</title><style>
:root{--ink:#102a43;--teal:#147d92;--orange:#f59e0b;--green:#2f855a;--paper:#f7fafc;--mist:#e6f4f1;--line:#b8cad6}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#f7fafc,#e6f4f1);color:var(--ink);font:16px/1.55 Arial,sans-serif}.shell{max-width:1180px;margin:auto;padding:24px}h1,h2{font-family:Georgia,serif}h1{font-size:clamp(28px,4vw,46px);margin:.15em 0}.eyebrow{color:var(--teal);font-weight:800;text-transform:uppercase;letter-spacing:1.1px;font-size:12px}.lead{font-size:18px;max-width:75ch}.tabs{display:flex;flex-wrap:wrap;gap:8px;margin:22px 0}.tabs a{padding:9px 12px;border:1px solid var(--line);color:var(--ink);text-decoration:none;background:#ffffffbb;border-radius:999px}.tabs a[aria-current=true]{background:var(--ink);color:#fff}.grid{display:grid;grid-template-columns:.8fr 1.5fr;gap:18px}.glass{background:#ffffffc7;border:1px solid #147d923d;box-shadow:0 14px 34px #102a4317,inset 0 1px #fff;border-radius:18px;padding:20px;backdrop-filter:blur(12px)}label{display:block;font-weight:800;margin:10px 0 5px}select{width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;background:#fff}button{padding:11px 15px;border:0;border-radius:9px;background:var(--teal);color:#fff;font-weight:800;cursor:pointer}.code{white-space:pre;overflow:auto;background:linear-gradient(135deg,#f1f8fafa,#e6f4f1cc);border:1px solid #147d9247;border-top:4px solid var(--teal);border-radius:14px;padding:17px;font:14px/1.7 ui-monospace,monospace;color:#243b53}.fn{color:#047857;font-weight:700}.num{color:#0369a1;font-weight:700}.str{color:#9a5b13}.op{color:#c2410c;font-weight:700}.matrix{display:grid;gap:6px;margin:18px 0;max-width:680px}.cell{display:grid;place-items:center;min-height:52px;background:#e6f4f1;border:1px solid #8bb9c1;border-radius:8px;font:700 15px ui-monospace,monospace;position:relative}.cell.masked{opacity:.28;background:#d9e2ec}.cell.selected{outline:3px solid var(--orange);background:#fff7e6}.axis{font-size:12px;color:#486581}.lens{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px}.fact{padding:11px;background:var(--paper);border-left:4px solid var(--green)}.callout{padding:14px;background:#fff7e6;border-left:5px solid var(--orange);margin:15px 0}@media(max-width:780px){.grid{grid-template-columns:1fr}.shell{padding:15px}}
</style></head><body><main class="shell"><div class="eyebrow">Interactive lab · Week 5</div><h1 id="title"></h1><p class="lead" id="intro"></p><nav class="tabs" id="tabs"></nav><section class="grid"><div class="glass"><h2>Configure the array lens</h2><p id="prompt"></p><div id="controls"></div><div class="callout"><strong>Predict:</strong> <span id="question"></span></div><button id="run">Apply operation</button></div><div class="glass"><h2>Array view</h2><div class="code" id="code"></div><div class="matrix" id="matrix"></div><div class="lens" id="lens"></div><div class="callout" id="result" aria-live="polite"></div></div></section></main><script>
const base=[[8.3,41.2,3750],[6.9,38.7,3400],[7.8,49.1,5200],[6.1,35.5,2850]];
const stations={
 compare:{label:'5.1 list vs array',title:'Array operations act on values, not containers',intro:'A Python list and a NumPy array can display similar numbers while giving multiplication different meaning.',prompt:'Choose a container, then multiply by 2.',question:'Will values double, or will the container repeat?',choices:['Python list','NumPy array'],build:c=>{let arr=[1,2,3],out=c==='Python list'?[1,2,3,1,2,3]:[2,4,6];return{code:c==='Python list'?`values = [1, 2, 3]\nresult = values * 2`:`values = np.array([1, 2, 3])\nresult = values * 2`,data:[out],facts:{container:c,operation:c==='Python list'?'repeat sequence':'elementwise multiply',result:`[${out}]`},result:c==='Python list'?'The list repeats. Lists do not promise numerical vector operations.':'Every array element doubles without an explicit loop.'}}},
 inspect:{label:'5.2 create + inspect',title:'Shape is part of an array’s meaning',intro:'Before calculating, inspect how many axes exist, how long each axis is, and which dtype represents the values.',prompt:'Choose the orientation of a 2 × 3 measurement table.',question:'What will shape report? Which axis names observations?',choices:['4 observations × 3 features','transpose to 3 × 4'],build:c=>{let d=c.startsWith('transpose')?base[0].map((_,j)=>base.map(r=>r[j])):base;return{code:c.startsWith('transpose')?`X = np.array(data).T\nX.shape, X.ndim, X.size, X.dtype`:`X = np.array(data)\nX.shape, X.ndim, X.size, X.dtype`,data:d,facts:{shape:`(${d.length}, ${d[0].length})`,ndim:2,size:d.length*d[0].length,dtype:'float64'},result:`The array has ${d.length} rows and ${d[0].length} columns. A transpose swaps, rather than renames, the axes.`}}},
 mask:{label:'5.3 indexing + masks',title:'A Boolean mask is an aligned yes/no question',intro:'Each Boolean corresponds to one row. Selection is trustworthy only when the mask and the observation axis align.',prompt:'Choose a body-mass threshold (third feature).',question:'Which entire rows survive the mask?',choices:[3000,3600,5000],build:c=>{let keep=base.map(r=>r[2]>=c);return{code:`X = np.array(data)\nmask = X[:, 2] >= ${c}\nselected = X[mask]`,data:base,mask:keep,facts:{column:'X[:, 2]',mask:`[${keep.map(x=>x?'T':'F')}]`,selected_rows:keep.filter(Boolean).length},result:`${keep.filter(Boolean).length} row(s) survive. The mask filters observations; it does not merely extract body mass.`}}},
 broadcast:{label:'5.4 vectorize + broadcast',title:'Broadcasting aligns compatible trailing dimensions',intro:'A length-three feature vector can act across every row of a (4, 3) matrix because its last dimension matches the feature axis.',prompt:'Choose an operation applied to every observation.',question:'What shapes must align, and which feature changes?',choices:['convert mass g → kg','center each feature'],build:c=>{let d,f;if(c.startsWith('convert')){d=base.map(r=>[r[0],r[1],r[2]/1000]);f={left_shape:'(4, 3)',right_shape:'(3,)',vector:'[1, 1, 0.001]'}}else{let means=base[0].map((_,j)=>base.reduce((s,r)=>s+r[j],0)/base.length);d=base.map(r=>r.map((v,j)=>+(v-means[j]).toFixed(2)));f={left_shape:'(4, 3)',right_shape:'(3,)',vector:`means = [${means.map(x=>x.toFixed(2))}]`}}return{code:c.startsWith('convert')?`scale = np.array([1, 1, 0.001])\nX_scaled = X * scale`:`means = X.mean(axis=0)\nX_centered = X - means`,data:d,facts:f,result:'One vector is reused across rows. Broadcasting is implicit iteration with an explicit shape rule.'}}},
 stats:{label:'5.5 feature statistics',title:'An axis answers “across what?”',intro:'A statistic without an axis story is easy to misinterpret. Connect every summary to observations, features, and units.',prompt:'Choose a reduction on the observation-by-feature array.',question:'Will the result contain one number overall, one per feature, or one per observation?',choices:['mean axis=0','mean axis=1','overall mean'],build:c=>{let out;if(c==='mean axis=0')out=base[0].map((_,j)=>base.reduce((s,r)=>s+r[j],0)/base.length);else if(c==='mean axis=1')out=base.map(r=>r.reduce((a,b)=>a+b,0)/r.length);else out=[base.flat().reduce((a,b)=>a+b,0)/base.flat().length];return{code:`summary = X.${c==='overall mean'?'mean()':c.replace(' ','(')+')'}`,data:[out],facts:{input_shape:'(4, 3)',result_shape:c==='mean axis=0'?'(3,)':c==='mean axis=1'?'(4,)':'()',warning:c==='mean axis=1'||c==='overall mean'?'mixes incompatible units':'one statistic per feature'},result:`Result: [${out.map(x=>x.toFixed(2))}]. ${c==='mean axis=0'?'Axis 0 collapses observations and preserves features.':'Ask whether averaging unlike feature units is meaningful.'}`}}}
};
const aliases={'array-list-vs-array':'compare','array-create-inspect':'inspect','array-index-mask':'mask','array-vector-broadcast':'broadcast','array-statistics':'stats'};let key=aliases[new URLSearchParams(location.search).get('station')]||'compare',cfg=stations[key];const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));function hi(s){return esc(s).replace(/("[^"]*"|\b(?:np|array|mean)\b|\b\d+(?:\.\d+)?\b|&gt;=|=|\*|-)/g,t=>{let c=t[0]==='"'?'str':/^(np|array|mean)$/.test(t)?'fn':/^\d/.test(t)?'num':'op';return `<span class="${c}">${t}</span>`})}
function render(){title.textContent=cfg.title;intro.textContent=cfg.intro;prompt.textContent=cfg.prompt;question.textContent=cfg.question;tabs.innerHTML=Object.entries(stations).map(([k,v])=>`<a href="?station=${k}" aria-current="${k===key}">${v.label}</a>`).join('');controls.innerHTML=`<label for="choice">Experiment</label><select id="choice">${cfg.choices.map(v=>`<option>${esc(v)}</option>`).join('')}</select>`;go()}function go(){let raw=document.querySelector('#choice').value,v=/^\d+$/.test(raw)?Number(raw):raw,o=cfg.build(v),cols=Math.max(...o.data.map(r=>r.length));code.innerHTML=hi(o.code);matrix.style.gridTemplateColumns=`repeat(${cols},minmax(62px,1fr))`;matrix.innerHTML=o.data.flatMap((r,i)=>r.map((x,j)=>`<div class="cell ${o.mask&&o.mask[i]?'selected':o.mask?'masked':''}"><span>${Number.isFinite(x)?Math.round(x*100)/100:esc(x)}</span><small class="axis">[${i}, ${j}]</small></div>`)).join('');lens.innerHTML=Object.entries(o.facts).map(([k,v])=>`<div class="fact"><strong>${esc(k)}</strong><br>${esc(v)}</div>`).join('');result.textContent=o.result}run.onclick=go;render();
</script></body></html>
