<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Control Flow Observatory</title>
<style>
:root{--ink:#102a43;--muted:#486581;--teal:#147d92;--orange:#f59e0b;--green:#2f855a;--paper:#f7fafc;--mist:#e6f4f1;--line:#b8cad6;--red:#c53030}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#f7fafc,#e6f4f1);color:var(--ink);font:16px/1.55 Arial,sans-serif}.shell{max-width:1180px;margin:auto;padding:24px}.eyebrow{color:var(--teal);font-weight:800;text-transform:uppercase;letter-spacing:1.1px;font-size:12px}h1,h2{font-family:Georgia,serif}h1{font-size:clamp(28px,4vw,46px);margin:.15em 0}.lead{max-width:72ch;font-size:18px}.tabs{display:flex;flex-wrap:wrap;gap:8px;margin:22px 0}.tabs a{padding:9px 12px;border:1px solid var(--line);color:var(--ink);text-decoration:none;background:rgba(255,255,255,.72);border-radius:999px}.tabs a[aria-current=true]{background:var(--ink);color:white}.grid{display:grid;grid-template-columns:minmax(280px,.9fr) minmax(360px,1.4fr);gap:18px}.glass{background:rgba(255,255,255,.76);border:1px solid rgba(20,125,146,.24);box-shadow:0 14px 34px rgba(16,42,67,.09),inset 0 1px #fff;border-radius:18px;padding:20px;backdrop-filter:blur(12px)}label{display:block;font-weight:700;margin:12px 0 5px}select,input{width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;background:white;color:var(--ink)}button{border:0;border-radius:9px;padding:11px 15px;font-weight:800;cursor:pointer}.primary{background:var(--teal);color:white}.secondary{background:#fff;border:1px solid var(--line);color:var(--ink)}.actions{display:flex;gap:9px;margin-top:16px}.code{white-space:pre;overflow:auto;background:linear-gradient(135deg,rgba(241,248,250,.98),rgba(230,244,241,.8));border:1px solid rgba(20,125,146,.28);border-top:4px solid var(--teal);border-radius:14px;padding:17px;font:14px/1.7 ui-monospace,monospace;color:#243b53}.kw{color:#6d28d9;font-weight:700}.fn{color:#047857;font-weight:700}.num{color:#0369a1;font-weight:700}.str{color:#9a5b13}.op{color:#c2410c;font-weight:700}.trace{display:grid;gap:10px;margin-top:14px}.step{display:grid;grid-template-columns:52px 1fr;gap:12px;align-items:start;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;opacity:.55}.step.active{opacity:1;border-color:var(--orange);box-shadow:0 6px 18px rgba(245,158,11,.15)}.badge{display:grid;place-items:center;width:42px;height:42px;border-radius:50%;background:var(--mist);font-weight:800}.ledger{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px;margin:12px 0}.cell{padding:10px;background:#f7fafc;border-left:4px solid var(--teal)}.callout{border-left:5px solid var(--orange);background:#fff7e6;padding:13px;margin:14px 0}.return{border-left-color:var(--green);background:#edf9f0}.sr{position:absolute;left:-9999px}@media(max-width:780px){.grid{grid-template-columns:1fr}.shell{padding:15px}}@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important}}
</style></head><body><main class="shell"><div class="eyebrow">Interactive lab · Week 3</div><h1 id="title">Control Flow Observatory</h1><p class="lead" id="intro"></p><nav class="tabs" id="tabs" aria-label="Stations"></nav><section class="grid"><div class="glass"><h2>Set the experiment</h2><p id="prompt"></p><div id="controls"></div><div class="callout"><strong>Predict first:</strong> <span id="question"></span></div><div class="actions"><button class="primary" id="next">Reveal next step</button><button class="secondary" id="reset">Reset</button></div></div><div class="glass"><h2>Execution ribbon</h2><div class="code" id="code" aria-label="Python example"></div><div class="ledger" id="ledger"></div><div class="trace" id="trace"></div><div class="callout return" id="result" aria-live="polite"><strong>Return / result:</strong> make a prediction, then reveal the trace.</div></div></section></main>
<script>
const stations={
 for:{label:'3.1 for + range',title:'Iteration is a sequence of state changes',intro:'A loop is not “the computer doing everything at once.” Watch one value arrive, one body execute, and one accumulator change at a time.',prompt:'Choose the stop value. Python will visit values from 0 up to—but not including—stop.',question:'How many times will the body run, and what will total become?',control:'stop',options:[3,4,5,6],build:v=>{let s=[],t=0;for(let i=0;i<v;i++){t+=i;s.push({head:`Iteration ${i+1}`,body:`i receives ${i}; total changes to ${t}`,ledger:{i,total:t}})}return{code:`total = 0\nfor i in range(${v}):\n    total = total + i`,steps:s,result:`The body ran ${v} times. total is ${t}. The stop value ${v} was excluded.`}}},
 while:{label:'3.2 while + guards',title:'A while loop needs a path toward stopping',intro:'A condition is checked before every repetition. Trace the progress variable and see how continue, break, and the natural stopping condition differ.',prompt:'Choose a safety limit. Values divisible by 3 are skipped; the loop breaks when the counter reaches the limit.',question:'Which values are collected before break ends the loop?',control:'limit',options:[4,5,7,8],build:v=>{let s=[],kept=[];for(let n=0;n<10;n++){if(n===v){s.push({head:`Check n = ${n}`,body:'break runs: leave the loop immediately',ledger:{n,action:'break'}});break}if(n%3===0){s.push({head:`Check n = ${n}`,body:'continue skips the remaining body',ledger:{n,action:'continue'}});continue}kept.push(n);s.push({head:`Check n = ${n}`,body:`append ${n}; then repeat`,ledger:{n,kept:`[${kept}]`}})}return{code:`n = -1\nkept = []\nwhile n < 9:\n    n = n + 1\n    if n == ${v}: break\n    if n % 3 == 0: continue\n    kept.append(n)`,steps:s,result:`kept is [${kept}]. continue skipped one iteration; break ended the entire loop.`}}},
 functions:{label:'3.3 functions',title:'A function is a named transformation with a contract',intro:'Arguments enter a fresh local frame. Statements run there, and return sends one value back to the caller.',prompt:'Choose a raw body-mass value. The function converts kilograms to grams and returns the result.',question:'What enters the frame, what name is local, and what comes back?',control:'mass',options:[3.2,3.75,4.1,5],build:v=>({code:`def grams(mass_kg):\n    converted = mass_kg * 1000\n    return converted\n\nbody_mass_g = grams(${v})`,steps:[{head:'Define',body:'Store the function instructions; do not run the body yet.',ledger:{grams:'function'}},{head:'Call',body:`Bind local mass_kg to ${v}.`,ledger:{mass_kg:v}},{head:'Transform',body:`Create local converted = ${v*1000}.`,ledger:{converted:v*1000}},{head:'Return',body:'Send converted to the call site; discard the local frame.',ledger:{body_mass_g:v*1000}}],result:`grams(${v}) returns ${v*1000}. converted is local; body_mass_g receives the returned value.`})},
 scope:{label:'3.4 scope + arguments',title:'Names are resolved in a particular frame',intro:'Defaults make a promise; keyword arguments make calls readable. Neither turns local names into global ones.',prompt:'Choose which keyword argument overrides the default decimal precision.',question:'Which value does decimals receive inside the function?',control:'decimals',options:[0,1,2,3],build:v=>({code:`unit = "g"\ndef label(value, decimals=1):\n    rounded = round(value, decimals)\n    return f"{rounded} {unit}"\n\nnote = label(3750.46, decimals=${v})`,steps:[{head:'Global frame',body:'unit and label are available to the caller.',ledger:{unit:'g'}},{head:'Call frame',body:`value = 3750.46; keyword override sets decimals = ${v}.`,ledger:{value:3750.46,decimals:v}},{head:'Resolve',body:'rounded is local; unit is found in the enclosing global frame.',ledger:{rounded:Number((3750.46).toFixed(v)),unit:'g'}},{head:'Return',body:'The formatted string returns to note.',ledger:{note:`${(3750.46).toFixed(v)} g`}}],result:`The keyword argument overrides the default. note receives ${(3750.46).toFixed(v)} g.`})},
 cleaning:{label:'3.5 cleaning helpers',title:'A cleaning helper should return evidence, not hide decisions',intro:'A reusable helper can normalize representation while preserving why a value was accepted or rejected.',prompt:'Choose a messy value from a dataset column.',question:'Will the helper return a number, or a missing-value reason?',control:'raw',options:[' 3,750 ','NA','4.2 kg',''],build:v=>{let clean=v.trim().replace(',',''),ok=/^\d+(\.\d+)?$/.test(clean),val=ok?Number(clean):null;return{code:`def clean_mass(raw):\n    text = raw.strip().replace(",", "")\n    if text in {"", "NA"}:\n        return None, "missing"\n    if not text.replace(".", "", 1).isdigit():\n        return None, "invalid format"\n    return float(text), "ok"\n\nvalue, reason = clean_mass(${JSON.stringify(v)})`,steps:[{head:'Receive',body:`raw is ${JSON.stringify(v)}.`,ledger:{raw:JSON.stringify(v)}},{head:'Normalize',body:`strip and remove comma → ${JSON.stringify(clean)}.`,ledger:{text:JSON.stringify(clean)}},{head:'Validate',body:ok?'The normalized text is numeric.':'The value is missing or has an invalid format.',ledger:{valid:ok}},{head:'Return',body:ok?`Return (${val}, "ok").`:`Return (None, "${clean===''||clean==='NA'?'missing':'invalid format'}").`,ledger:{value:ok?val:'None'}}],result:ok?`Accepted ${val}; reason = "ok".`:`No number was invented; reason = "${clean===''||clean==='NA'?'missing':'invalid format'}".`}}}
};
const aliases={'control-flow-for':'for','control-flow-while':'while','control-flow-functions':'functions','control-flow-scope':'scope','control-flow-cleaning':'cleaning'};let key=aliases[new URLSearchParams(location.search).get('station')]||'for',cfg=stations[key],cursor=0,run;
const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function hi(s){return esc(s).replace(/("[^"]*"|'[^']*'|\b(?:def|for|in|while|if|not|return|break|continue)\b|\b(?:range|round|float)\b|\b\d+(?:\.\d+)?\b|==|=|\+|\*|%|&lt;)/g,t=>{let c=/^["']/.test(t)?'str':/^(def|for|in|while|if|not|return|break|continue)$/.test(t)?'kw':/^(range|round|float)$/.test(t)?'fn':/^\d/.test(t)?'num':'op';return `<span class="${c}">${t}</span>`})}
function render(){document.title=cfg.label+' · Control Flow Observatory';title.textContent=cfg.title;intro.textContent=cfg.intro;prompt.textContent=cfg.prompt;question.textContent=cfg.question;tabs.innerHTML=Object.entries(stations).map(([k,v])=>`<a href="?station=${k}" aria-current="${k===key}">${v.label}</a>`).join('');controls.innerHTML=`<label for="choice">${cfg.control}</label><select id="choice">${cfg.options.map(v=>`<option>${esc(v)}</option>`).join('')}</select>`;document.querySelector('#choice').onchange=reset;reset()}
function reset(){cursor=0;let raw=document.querySelector('#choice').value;let v=cfg.control==='raw'?raw:Number(raw);run=cfg.build(v);code.innerHTML=hi(run.code);trace.innerHTML=run.steps.map((s,i)=>`<div class="step" id="s${i}"><div class="badge">${i+1}</div><div><strong>${s.head}</strong><br>${s.body}</div></div>`).join('');ledger.innerHTML='<div class="cell"><strong>State ledger</strong><br>Reveal a step to inspect it.</div>';result.innerHTML='<strong>Return / result:</strong> make a prediction, then reveal the trace.'}
next.onclick=()=>{if(cursor<run.steps.length){document.querySelector('#s'+cursor).classList.add('active');let l=run.steps[cursor].ledger;ledger.innerHTML=Object.entries(l).map(([k,v])=>`<div class="cell"><strong>${k}</strong><br>${esc(v)}</div>`).join('');cursor++}if(cursor===run.steps.length)result.innerHTML='<strong>Return / result:</strong> '+run.result};document.querySelector('#reset').onclick=reset;render();
</script></body></html>
